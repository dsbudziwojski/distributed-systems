syntax = "proto3";

package gfs.v1;

option go_package = "github.com/dsbudziwojski/gfs-lite/gen/gfs/v1;gfsv1";

service MasterService {
	rpc RegisterChunkServer(RegisterChunkServerRequest) returns (RegisterChunkServerResponse);
	rpc GetClusterStatus(GetClusterStatusRequest) returns (GetClusterStatusResponse);
}

message RegisterChunkServerRequest {
	string server_id = 1;
	string address = 2;
}

message RegisterChunkServerResponse {
	bool accepted = 1;
}

message GetClusterStatusRequest {}

message GetClusterStatusResponse {
	repeated ChunkServerInfo chunk_servers = 1;
}

message ChunkServerInfo {
	string server_id = 1;
	string address = 2;
}
